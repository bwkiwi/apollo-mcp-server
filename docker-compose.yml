version: '3.8'

services:
  apollo-mcp:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./config:/config:ro
      - apollo-mcp-sessions:/data
    environment:
      - RUST_LOG=info
      - NO_COLOR=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  apollo-mcp-sessions:
    driver: local