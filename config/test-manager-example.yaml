# Example configuration for Test Manager integration
#
# This configuration demonstrates how to enable the Test Manager features
# for IT-Ops backend testing support.

# GraphQL endpoint (required)
endpoint: http://localhost:5000/graphql

# Transport configuration
transport:
  type: streamable_http
  address: 127.0.0.1
  port: 3100

# Schema source
schema:
  type: local
  path: ./graphql/schema.graphql

# Operations source
operations:
  type: introspect

# Test Manager Configuration
test_manager:
  # Enable test manager features
  enabled: true

  # Optional: Explicit backend URL
  # If not specified, will be auto-derived from 'endpoint' above
  # (removes /graphql suffix)
  # backend_url: "http://localhost:5000"

  # Optional: Fallback MCP description when backend is unavailable
  # This allows the server to start even if the IT-Ops backend is down
  fallback_description: |
    ## Test Manager Features

    The following test management tools are available for IT-Ops testing:

    ### Snapshot Management
    - **snapshot_clear**: Clear all Layer 2 data for clean slate testing
    - **snapshot_load**: Load a saved snapshot to restore test state
    - **snapshot_save**: Save current state as a snapshot
    - **snapshot_list**: List all available snapshots

    ### Test Definition Management
    - **test_get**: Retrieve a test definition
    - **test_save**: Create a new test definition
    - **test_update**: Update an existing test
    - **test_save_result**: Save test execution results

    ### MCP Description Control
    - **mcp_description_get**: Get additional MCP description
    - **mcp_description_set**: Update MCP description dynamically

  # Optional: HTTP request timeout in milliseconds
  timeout_ms: 5000

# Enable introspection tools
introspection:
  execute:
    enabled: true
  introspect:
    enabled: true
  search:
    enabled: true
  validate:
    enabled: true
